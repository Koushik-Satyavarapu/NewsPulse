<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NewsPulse{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js for Pie and Bar Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <!-- Google Fonts: Poppins -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">
    <!-- CSS.gg Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/css.gg/icons/all.css">
    <style>
        :root {
            --bg-dark: rgb(24, 24, 24);
            --bg-light: #e4e4e4;
            --primary-color: #20c997;
            --primary-hover: #17a2b8;
            --text-color: #fff;
            --card-bg: #fff;
            --body-bg: linear-gradient(
                to right top,
                #d16ba5,
                #c777b9,
                #ba83ca,
                #aa8fd8,
                #9a9ae1,
                #8aa7ec,
                #79b3f4,
                #69bff8,
                #52cffe,
                #41dfff,
                #46eefa,
                #5ffbf1
            );
        }

        *,
        *::after,
        *::before {
            font-family: "Poppins", sans-serif;
        }

        a,
        a:hover,
        a:focus,
        a:active {
            text-decoration: none;
            color: inherit;
        }

        body {
            overflow-x: hidden;
            background: var(--body-bg);
            min-height: 100vh;
            color: var(--text-color);
            transition: background 0.3s ease;
        }

        .navbar {
            background-color: var(--bg-dark);
            padding: 1rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .navbar-brand,
        .nav-link {
            color: var(--text-color) !important;
            transition: color 0.3s;
        }

        .navbar-brand:hover,
        .nav-link:hover {
            color: #5ffbf1 !important;
        }

        .navbar .menu-toggle {
            display: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 1rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links .hide-toggle {
            display: none;
        }

        .container-fluid {
            max-width: 1200px;
            margin-top: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            transition: background-color 0.3s;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(32, 201, 151, 0.25);
        }

        .sidebar {
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .chart-container {
            max-width: 100%;
            height: 200px;
            margin-bottom: 1rem;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1050;
        }

        .spinner {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
        }

        .spinner.active {
            display: block;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 575.98px) {
            .navbar {
                position: relative;
            }

            .navbar .menu-toggle {
                display: block;
            }

            .nav-links {
                position: absolute;
                top: 0px;
                left: 40%;
                right: 0;
                height: 100vh;
                flex-direction: column;
                background-color: var(--bg-dark);
                box-shadow: -35px 0px 20px -25px rgba(0, 0, 0, 0.548);
                -webkit-backdrop-filter: blur(4px);
                backdrop-filter: blur(4px);
                justify-content: center;
                align-items: flex-start;
                padding: 0rem;
                z-index: 999;
                transition: all 200ms ease;
            }

            .nav-links.show {
                transform: translateX(0%);
                visibility: visible;
                opacity: 1;
            }

            .nav-links.hide {
                transform: translateX(100%);
                visibility: hidden;
                opacity: 0;
            }

            .nav-links .hide-toggle {
                --ggs: 1.5;
                display: block;
                position: absolute;
                top: 20px;
                right: 20px;
                cursor: pointer;
                font-size: 50px;
                color: var(--text-color);
            }

            .nav-links .nav-link {
                width: 100%;
                border-radius: 10px;
                padding: 1rem 2rem;
                margin-left: 15px;
                margin-bottom: 20px;
            }

            .nav-links .nav-link:hover {
                color: rgb(0, 0, 0) !important;
                background: whitesmoke;
            }
        }

        /* Background Animation */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background-size: 200% 200%;
            animation: gradientShift 15s ease infinite;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Mobile Menu Toggle
            const menuToggle = document.querySelector('.menu-toggle');
            const navLinks = document.querySelector('.nav-links');
            const hideToggle = document.querySelector('.hide-toggle');
            if (menuToggle && navLinks && hideToggle) {
                menuToggle.addEventListener('click', () => {
                    navLinks.classList.toggle('show');
                    navLinks.classList.toggle('hide');
                });
                hideToggle.addEventListener('click', () => {
                    navLinks.classList.remove('show');
                    navLinks.classList.add('hide');
                });
            }

            // Toast Notifications
            const flashMessages = JSON.parse('{{ get_flashed_messages(with_categories=true) | tojson | safe }}');
            if (flashMessages.length) {
                const toastContainer = document.createElement('div');
                toastContainer.className = 'toast-container';
                document.body.appendChild(toastContainer);
                flashMessages.forEach(([category, message]) => {
                    const toast = document.createElement('div');
                    toast.className = `toast align-items-center text-white bg-${category === 'message' ? 'success' : 'danger'} border-0`;
                    toast.setAttribute('role', 'alert');
                    toast.setAttribute('aria-live', 'assertive');
                    toast.setAttribute('aria-atomic', 'true');
                    toast.innerHTML = `
                        <div class="d-flex">
                            <div class="toast-body">${message}</div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                        </div>
                    `;
                    toastContainer.appendChild(toast);
                    const bsToast = new bootstrap.Toast(toast);
                    bsToast.show();
                    setTimeout(() => bsToast.hide(), 5000);
                });
            }
        });
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('home') }}">NewsPulse</a>
            <i class="gg-menu menu-toggle"></i>
            <div class="nav-links hide">
                <i class="gg-close hide-toggle"></i>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('home') }}">Home</a>
                    </li>
                    {% if current_user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('profile') }}">Profile</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('analyze') }}">Analyze Text</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('login') }}">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('signup') }}">Sign Up</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    <div class="container-fluid">
        {% block content %}{% endblock %}
    </div>
    <div class="spinner">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
    <!-- Bootstrap 5 JS and Popper -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</body>
</html>
