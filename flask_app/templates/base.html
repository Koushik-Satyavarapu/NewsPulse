<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - NewsPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-light: #F9FAFB;
            --bg-gradient: linear-gradient(180deg, #F9FAFB 0%, #E5E7EB 100%);
            --bg-secondary: #F3F4F6;
            --navbar-dark: #111827;
            --text-headline: #111827;
            --text-body: #374151;
            --text-light: #F9FAFB;
            --accent-primary: #EF4444;
            --accent-secondary: #3B82F6;
            --accent-success: #22C55E;
            --accent-warning: #FACC15;
            --card-bg-light: #FFFFFF;
        }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-light); }
        .navbar {
            background: var(--navbar-dark);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: transform 0.3s ease-in-out;
        }
        .navbar.hidden { transform: translateY(-100%); }
        .nav-link {
            color: var(--text-light) !important;
            position: relative;
            transition: color 0.3s;
        }
        .nav-link::after {
            content: '';
            display: block;
            width: 0;
            height: 2px;
            background: var(--accent-secondary);
            transition: width 0.3s;
            position: absolute;
            bottom: -2px;
            left: 0;
        }
        .nav-link:hover::after { width: 100%; }
        .nav-link:hover { color: var(--accent-primary) !important; }
        .btn-primary {
            background: var(--accent-primary);
            color: var(--text-light);
            border-radius: 6px;
            padding: 10px 20px;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            background: #DC2626;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--accent-secondary);
            color: var(--accent-secondary);
            border-radius: 6px;
            padding: 10px 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-secondary::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-secondary);
            z-index: -1;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover::before { left: 0; }
        .btn-secondary:hover { color: var(--text-light); }
        .card {
            background-color: var(--card-bg-light);
            transition: all 0.3s ease;
            border-radius: 15px;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .form-select, .form-control { border-color: var(--accent-secondary); }
        .form-select:focus, .form-control:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 5px rgba(239, 68, 68, 0.5);
        }
        .dropdown-menu {
            background-color: var(--card-bg-light);
            transform-origin: top;
            transform: scaleY(0);
            transition: all 0.3s ease-in-out;
        }
        .dropdown-menu.show { transform: scaleY(1); }
        .dropdown-item:hover { background-color: rgba(59, 130, 246, 0.1); }
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }
    </style>
    <script>
        // Sticky Navbar: Hide on scroll down, show on scroll up
        let lastScrollTop = 0;
        window.addEventListener('scroll', function() {
            let currentScroll = window.pageYOffset || document.documentElement.scrollTop;
            let navbar = document.querySelector('.navbar');
            if (currentScroll > lastScrollTop && currentScroll > 100) {
                navbar.classList.add('hidden');
            } else {
                navbar.classList.remove('hidden');
            }
            lastScrollTop = currentScroll <= 0 ? 0 : currentScroll;
        });

        // Fade-in on scroll for cards
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.card');
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate__animated', 'animate__fadeInUp');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            cards.forEach(card => observer.observe(card));

            // Ripple effect for buttons
            document.querySelectorAll('.btn-primary, .btn-secondary').forEach(button => {
                button.addEventListener('click', function(e) {
                    const rect = button.getBoundingClientRect();
                    const ripple = document.createElement('span');
                    ripple.classList.add('ripple');
                    const size = Math.max(rect.width, rect.height);
                    ripple.style.width = ripple.style.height = size + 'px';
                    ripple.style.left = e.clientX - rect.left - size / 2 + 'px';
                    ripple.style.top = e.clientY - rect.top - size / 2 + 'px';
                    button.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);
                });
            });
        });
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-lg">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('home') }}" style="color: var(--text-light);">NewsPulse</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    {% if request.path != '/login' %}
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('home') }}">Home</a>
                        </li>
                    {% endif %}
                    {% if current_user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('dashboard') }}">Trending Now</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('analyze') }}">Analyze Text</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('profile') }}">Profile</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('login') }}">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('signup') }}">Sign Up</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        {% block content %}{% endblock %}
    </div>

    <div id="loading" class="d-none position-fixed top-0 start-0 w-100 h-100 bg-dark bg-opacity-50 d-flex align-items-center justify-content-center">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
</body>
</html>
